<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排球少年 HQTI 人格测试</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #f8fff8 0, #f6faf6 36%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127, 165, 134, 0.18), rgba(127, 165, 134, 0.02));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 680px;
    }
    .hero .sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 720px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      align-items: stretch;
      margin-top: 24px;
    }

    .mini-panel {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfefb, #f3f8f4);
    }

    .mini-panel h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .mini-panel ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

        .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal::after { display: none; }
    .hero-minimal h1 {
      max-width: none;
      margin: 0;
    }
    .hero-actions-single {
      justify-content: center;
      margin-top: 28px;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(77, 106, 83, 0.18);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .language-selector {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    .lang-btn {
      padding: 10px 18px;
      font-size: 14px;
    }
    .lang-btn.active {
      background: var(--accent-strong);
      color: #fff;
      border-color: var(--accent-strong);
    }
    .lang-hint {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin-top: 10px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap,
    .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #edf3ee;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #97b59c, #5b7a62);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 16px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .question-title {
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .option:hover {
      border-color: #bcd0c1;
      background: #f8fcf9;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 800;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: stretch;
    }

    .type-box,
    .score-box,
    .dim-box,
    .top3-box,
    .about-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }

    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .05em;
    }

    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .type-subname {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .type-desc {
      margin-top: 18px;
      line-height: 1.85;
      font-size: 15px;
      color: #304034;
    }

    .score-box h3,
    .dim-box h3,
    .top3-box h3,
    .about-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .score-item .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-item .v {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .dim-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .dim-pill {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .dim-pill .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .dim-pill .value {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .top3-list {
      display: grid;
      gap: 10px;
    }

    .top3-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .top3-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .top3-item span {
      color: var(--muted);
      font-size: 13px;
    }

    .top3-score {
      color: var(--accent-strong);
      font-weight: 800;
      white-space: nowrap;
    }

    .about-box p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    
    .result-layout {
      display: grid;
      gap: 18px;
    }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
        .poster-box {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 280px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(127,165,134,0.16), rgba(127,165,134,0) 40%),
        linear-gradient(180deg, #ffffff, #f7fbf8);
    }
    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127,165,134,0.12), rgba(127,165,134,0.01));
      pointer-events: none;
    }
    .poster-image {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      position: relative;
      z-index: 1;
    }
    .poster-box.no-image .poster-image {
      display: none;
    }
    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .result-actions {
      margin-top: 22px;
      display: flex;
      justify-content: flex-end;
    }
    .analysis-box p {
      margin: 0;
      color: #304034;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .dim-list {
      display: grid;
      gap: 12px;
    }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .dim-item-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }
    .dim-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .author-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
      overflow: hidden;
    }
    .author-header {
      cursor: pointer;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .author-toggle {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .author-hint {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 6px;
      flex-basis: 100%;
      order: 3;
      background: var(--soft);
      padding: 10px 12px;
      border-radius: 8px;
    }
    .author-content {
      border-top: 1px solid var(--line);
      padding: 14px 18px 18px;
    }
    .author-content p {
      margin: 14px 0 0;
      color: #304034;
      font-size: 14px;
      line-height: 1.8;
    }
    .author-main p:first-child {
      margin-top: 0;
    }
    .author-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .author-item:first-child {
      margin-top: 0;
    }
    .author-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .author-img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .author-item .text {
      flex: 1;
      font-size: 14px;
      color: #304034;
      line-height: 1.6;
    }
    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
    }
    .lightbox.show {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
    }
    .lightbox-close:hover {
      color: #ccc;
    }
    .lightbox-content {
      max-width: 90%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .download-btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: var(--accent-strong);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.3s, transform 0.2s;
    }
    .download-btn:hover {
      background: #3d5a43;
      transform: translateY(-2px);
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }

@media (max-width: 860px) {
      .hero-grid,
      .result-hero {
        grid-template-columns: 1fr;
      }
      .dim-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
      .dim-grid,
      .score-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1 id="introTitle">排球少年 HQTI 人格测试</h1>
        <div class="sub" id="introSubtitle">测测你最像排球少年里的谁</div>
        <div class="language-selector" id="languageSelector">
          <button id="langZhBtn" class="btn-secondary lang-btn active">简体中文</button>
          <button id="langEnBtn" class="btn-secondary lang-btn">English</button>
        </div>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary" disabled>开始测试</button>
        </div>
        <div class="lang-hint" id="langHint">请先选择语言</div>
      </div>

      <div class="author-box card" style="margin-top: 20px;" id="authorBox">
        <div class="author-header" onclick="toggleAuthorBox()">
          <span id="authorTitle">作者信息</span>
          <span class="author-hint" id="authorHint">关注作者可及时收取最新版本通知，或者对相关内容进行反馈沟通！谢谢支持！作者是超活力排球少女！欢迎关注！后续也可能推出其他相关作品！嘻嘻</span>
          <span id="authorToggle" class="author-toggle">▼</span>
        </div>
        <div class="author-content" id="authorContent" style="display:none;">
          <div class="author-main">
            <p id="authorName">作者：明明天天</p>

            <div class="author-item">
              <img class="author-img" src="./author/douyin.jpg" alt="TikTok QR" onclick="openLightbox(this)">
              <div class="text" id="authorDouyin">抖音：明明天天（71460046204）</div>
            </div>

            <div class="author-item">
              <img class="author-img" src="./author/rednote.jpg" alt="RedNote QR" onclick="openLightbox(this)">
              <div class="text" id="authorRednote">小红书：明明天天（919630201）</div>
            </div>

            <div class="author-item">
              <img class="author-img" src="./author/bilibili.jpg" alt="Bilibili QR" onclick="openLightbox(this)">
              <div class="text" id="authorBilibili">B站：明明天天呀（241427014）</div>
            </div>
          </div>
      </div>
      
      <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <a id="download-btn" class="download-btn" download>下载图片</a>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 36</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">全选完才会放行。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <div style="display: flex; gap: 10px;">
            <button id="prevBtn" class="btn-secondary" disabled>上一题</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
          </div>
          </div>
        </div>
      </div>
    </section>

    
    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {

        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 将分数转换为等级（L/M/H）
    function sumToLevel(score, maxScore) {
      // 对于满分12分的维度，使用用户指定的区间
      if (maxScore === 12) {
        if (score < 8) return 'L';
        if (score <= 10) return 'M';
        return 'H';
      }
      // 对于其他满分的维度，使用等比例划分
      const thirdScore = maxScore / 3;
      const twoThirdsScore = maxScore * 2 / 3;
      if (score < thirdScore) return 'L';
      if (score < twoThirdsScore) return 'M';
      return 'H';
    }

    // 将等级转换为数字（1/2/3）
    function levelNum(level) {
      return { L: 1, M: 2, H: 3 }[level];
    }

    // 解析模式字符串为字符数组
    function parsePattern(pattern) {
      return pattern.replace(/-/g, '').split('');
    }

    // 计算测试结果
    function computeResult() {
      const rawScores = {};
      const levels = {};
      const dimQuestionCount = {};
      // 初始化每个维度的分数和问题数为0
      Object.keys(dimensionMeta).forEach(dim => { 
        rawScores[dim] = 0;
        dimQuestionCount[dim] = 0;
      });

      // 计算每个维度的总分和问题数
      questions.forEach(q => {
        rawScores[q.dim] += Number(app.answers[q.id] || 0);
        dimQuestionCount[q.dim]++;
      });

      // 将每个维度的分数转换为等级
      Object.entries(rawScores).forEach(([dim, score]) => {
        const maxScore = dimQuestionCount[dim] * 4; // 每个问题满分4分
        levels[dim] = sumToLevel(score, maxScore);
      });

      // 计算用户向量和每个角色的相似度（使用原始分数）
      const userVector = dimensionOrder.map(dim => rawScores[dim]);
      const ranked = NORMAL_TYPES.map(type => {
        const vector = type.vector;
        
        let distance = 0;
        let totalPossibleDistance = 0;
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          totalPossibleDistance += 12; // 每个维度最大可能差异为12
        }
        const similarity = Math.max(0, Math.round((1 - distance / totalPossibleDistance) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, similarity };
      }).sort((a, b) => {
        if (a.similarity !== b.similarity) return b.similarity - a.similarity;
        return a.distance - b.distance;
      });

      const bestNormal = ranked[0];
      const drunkTriggered = getDrunkTriggered();

      let finalType;
      let modeKicker = '你的排球少年人格';
      let badge = `匹配度 ${bestNormal.similarity}%`;
      let sub = '维度命中度较高，你非常像这位角色！';
      let subEn = 'High dimension match, you are very similar to this character!';
      let special = false;
      let secondaryType = null;

      finalType = bestNormal;

      return {
        rawScores,
        levels,
        ranked,
        bestNormal,
        finalType,
        modeKicker,
        badge,
        sub,
        subEn,
        special,
        secondaryType
      };
    }

      const explanations = app.isEnglish ? DIM_EXPLANATIONS_EN : DIM_EXPLANATIONS;
      
      document.getElementById('resultModeKicker').textContent = t.resultModeKicker;
      document.getElementById('resultTypeName').textContent = app.isEnglish ? `${type.cn} (${type.code})` : `${type.code}（${type.cn}）`;
      document.getElementById('matchBadge').textContent = app.isEnglish ? `${t.matchBadge}: ${result.badge.replace('匹配度 ','')}%` : result.badge;
      document.getElementById('resultTypeSub').textContent = app.isEnglish ? result.subEn : result.sub;
      document.getElementById('resultDesc').textContent = app.isEnglish ? (type.descEn || type.desc) : type.desc;
      document.getElementById('posterCaption').textContent = t.posterCaption;
      document.getElementById('resultDescTitle').textContent = t.resultDescTitle;
      document.getElementById('dimTitle').textContent = t.dimTitle;
      document.getElementById('funNoteTitle').textContent = t.funNoteTitle;
      document.getElementById('funNote').textContent = t.funNote;
      document.getElementById('translateBtn').textContent = t.translateBtn;
      document.getElementById('restartBtn').textContent = t.restartBtn;
      document.getElementById('toTopBtn').textContent = t.toTopBtn;
      document.getElementById('backIntroBtn').textContent = t.backIntroBtn;
      
      renderDimList(result, explanations);
    });
  </script>
