<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排球少年 HQTI 人格测试</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #f8fff8 0, #f6faf6 36%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127, 165, 134, 0.18), rgba(127, 165, 134, 0.02));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 680px;
    }
    .hero .sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      max-width: 720px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      align-items: stretch;
      margin-top: 24px;
    }

    .mini-panel {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfefb, #f3f8f4);
    }

    .mini-panel h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .mini-panel ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

        .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }
    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal::after { display: none; }
    .hero-minimal h1 {
      max-width: none;
      margin: 0;
    }
    .hero-actions-single {
      justify-content: center;
      margin-top: 28px;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(77, 106, 83, 0.18);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap,
    .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #edf3ee;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #97b59c, #5b7a62);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 16px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .question-title {
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .option:hover {
      border-color: #bcd0c1;
      background: #f8fcf9;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 800;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: stretch;
    }

    .type-box,
    .score-box,
    .dim-box,
    .top3-box,
    .about-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }

    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .05em;
    }

    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .type-subname {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
    }

    .type-desc {
      margin-top: 18px;
      line-height: 1.85;
      font-size: 15px;
      color: #304034;
    }

    .score-box h3,
    .dim-box h3,
    .top3-box h3,
    .about-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .score-item .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-item .v {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .dim-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .dim-pill {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .dim-pill .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .dim-pill .value {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
    }

    .top3-list {
      display: grid;
      gap: 10px;
    }

    .top3-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .top3-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .top3-item span {
      color: var(--muted);
      font-size: 13px;
    }

    .top3-score {
      color: var(--accent-strong);
      font-weight: 800;
      white-space: nowrap;
    }

    .about-box p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    
    .result-layout {
      display: grid;
      gap: 18px;
    }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
        .poster-box {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 280px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(127,165,134,0.16), rgba(127,165,134,0) 40%),
        linear-gradient(180deg, #ffffff, #f7fbf8);
    }
    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127,165,134,0.12), rgba(127,165,134,0.01));
      pointer-events: none;
    }
    .poster-image {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      position: relative;
      z-index: 1;
    }
    .poster-box.no-image .poster-image {
      display: none;
    }
    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .result-actions {
      margin-top: 22px;
      display: flex;
      justify-content: flex-end;
    }
    .analysis-box p {
      margin: 0;
      color: #304034;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .dim-list {
      display: grid;
      gap: 12px;
    }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .dim-item-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }
    .dim-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .author-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '展开';
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .author-box[open] summary::after {
      content: '收起';
    }
    .author-content {
      border-top: 1px solid var(--line);
      padding: 0 18px 18px;
    }
    .author-content p {
      margin: 14px 0 0;
      color: #304034;
      font-size: 14px;
      line-height: 1.9;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }

@media (max-width: 860px) {
      .hero-grid,
      .result-hero {
        grid-template-columns: 1fr;
      }
      .dim-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
      .dim-grid,
      .score-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>排球少年 HQTI 人格测试</h1>
        <div class="sub">测测你最像排球少年里的谁</div>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">开始测试</button>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 36</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">全选完才会放行。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <div style="display: flex; gap: 10px;">
            <button id="prevBtn" class="btn-secondary" disabled>上一题</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
          </div>
          </div>
        </div>
      </div>
    </section>

    
    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="人格结果图" />
              <div id="posterCaption" class="poster-caption">你的排球少年人格</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">你的主类型</div>
              <div class="type-name" id="resultTypeName">排球少年人格</div>
              <div class="match" id="matchBadge">匹配度 92%</div>
              <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>该人格的简单解读</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>十维度评分</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>友情提示</h3>
            <p id="funNote">本测试仅供娱乐，别拿它当成你球场的剧本。</p>
          </div>

        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">重新测试</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  
  <script>
    // 维度元数据：定义测试的10个维度及其所属模型
    const dimensionMeta = {
      OFF: { name: 'OFF 进攻', model: '排球特质模型' },
      LDR: { name: 'LDR 领导', model: '排球特质模型' },
      RAT: { name: 'RAT 理性', model: '排球特质模型' },
      POS: { name: 'POS 阳光', model: '排球特质模型' },
      TAL: { name: 'TAL 天赋', model: '排球特质模型' },
      WLD: { name: 'WLD 野性', model: '排球特质模型' },
      CON: { name: 'CON 自信', model: '排球特质模型' },
      SRV: { name: 'SRV 发球能力', model: '排球技能模型' },
      RC: { name: 'RC 一传能力', model: '排球技能模型' },
      PAS: { name: 'PAS 传球能力', model: '排球技能模型' }
    };
    const questions = [
      // 排球相关问题（25个）
      {
        id: 'q1', dim: 'OFF',
        text: '面对对方高大的拦网（可理解为障碍），我会毫不犹豫地正面突破它，展现我的实力，而不会选择取巧的吊球（绕路）',
        options: [
          { label: '完全不认同', value: 1 },
          { label: '有点不认同', value: 2 },
          { label: '有点认同', value: 3 },
          { label: '完全认同', value: 4 }
        ]
      },
      {
        id: 'q2', dim: 'OFF',
        text: '我会认为进攻是最好的防守',
        options: [
          { label: '完全不认同', value: 1 },
          { label: '有点不认同', value: 2 },
          { label: '有点认同', value: 3 },
          { label: '完全认同', value: 4 }
        ]
      },
      // 生活作风态度相关问题（1）
      {
        id: 'q3', dim: 'OFF',
        text: '我酷爱暴力美学',
        options: [
          { label: '完全不认同', value: 1 },
          { label: '有点不认同', value: 2 },
          { label: '有点认同', value: 3 },
          { label: '完全认同', value: 4 }
        ]
      },
      {
        id: 'q4', dim: 'LDR',
        text: '我通常是带领队伍走出困境的人，而不是等待别人带领我',
        options: [
          { label: '完全不认同', value: 1 },
          { label: '有点不认同', value: 2 },
          { label: '有点认同', value: 3 },
          { label: '完全认同', value: 4 }
        ]
      },
      {
        id: 'q5', dim: 'LDR',
        text: '一起出去玩时周围的人会因为我在身边感到放心而不是闹心',
        options: [
          { label: '完全不认同', value: 1 },
          { label: '有点不认同', value: 2 },
          { label: '有点认同', value: 3 },
          { label: '完全认同', value: 4 }
        ]
      },
      // 生活作风态度相关问题（2）
      {
        id: 'q6', dim: 'LDR',
        text: '我在生活中经常主动承担组织工作',
        options: [

    // 屏幕元素：存储页面上的三个主要屏幕

    // 显示指定屏幕
    function showScreen(name) {
      Object.entries(screens).forEach(([key, el]) => {
        el.classList.toggle('active', key === name);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 打乱数组顺序
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 获取可见的问题列表
    function getVisibleQuestions() {
      // 只返回当前问题
      if (app.currentQuestionIndex < app.shuffledQuestions.length) {
        return [app.shuffledQuestions[app.currentQuestionIndex]];
      }
      return [];
    }

    // 获取问题的元数据标签
    function getQuestionMetaLabel(q) {
      if (q.special) return '补充题';
      return app.previewMode ? dimensionMeta[q.dim].name : '维度已隐藏';
    }

    // 渲染问题列表
    function renderQuestions() {
      const visibleQuestions = getVisibleQuestions();
      questionList.innerHTML = '';
      visibleQuestions.forEach((q, index) => {
        const card = document.createElement('article');
        card.className = 'question';
        card.innerHTML = `
          <div class="question-meta">
            <div class="badge">第 ${app.currentQuestionIndex + 1} 题</div>
            <div>${getQuestionMetaLabel(q)}</div>
          </div>
          <div class="question-title">${q.text}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              const code = ['A', 'B', 'C', 'D'][i] || String(i + 1);
              const checked = app.answers[q.id] === opt.value ? 'checked' : '';
              return `
                <label class="option">
                  <input type="radio" name="${q.id}" value="${opt.value}" ${checked} />
                  <div class="option-code">${code}</div>
                  <div>${opt.label}</div>
                </label>
              `;
            }).join('')}
          </div>
        `;
        questionList.appendChild(card);
      });

      // 为每个选项添加点击事件
      questionList.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', (e) => {
          const { name, value } = e.target;
          app.answers[name] = Number(value);
          updateProgress();
        });
      });

      updateProgress();
    }

    // 更新进度条
    function updateProgress() {
      const totalQuestions = app.shuffledQuestions.length;
      const answeredQuestions = Object.keys(app.answers).length;
      const percent = totalQuestions ? (answeredQuestions / totalQuestions) * 100 : 0;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${answeredQuestions} / ${totalQuestions}`;
      
      // 更新提交按钮文本
      if (app.currentQuestionIndex < totalQuestions - 1) {
        submitBtn.textContent = '下一题';
        testHint.textContent = '请选择答案后点击下一题继续';
      } else {
        submitBtn.textContent = '提交';
        testHint.textContent = '都做完了。现在可以把你的电子魂魄交给结果页审判。';
      }
      
      // 只有当前题已回答才启用按钮
      const currentQuestion = app.shuffledQuestions[app.currentQuestionIndex];
      const currentAnswered = currentQuestion && app.answers[currentQuestion.id] !== undefined;
      submitBtn.disabled = !currentAnswered;
      
      // 更新上一题按钮状态
      prevBtn.disabled = app.currentQuestionIndex === 0;
    }

        return 'H';
      }
      // 对于其他满分的维度，使用等比例划分
      const thirdScore = maxScore / 3;
      const twoThirdsScore = maxScore * 2 / 3;
      if (score < thirdScore) return 'L';
      if (score < twoThirdsScore) return 'M';
      return 'H';
    }

    // 将等级转换为数字（1/2/3）
    function levelNum(level) {
      return { L: 1, M: 2, H: 3 }[level];
    }

    // 解析模式字符串为字符数组
    function parsePattern(pattern) {
      return pattern.replace(/-/g, '').split('');
    }

    // 检查是否触发醉酒模式（当前未使用）
    function getDrunkTriggered() {
      return false;
    }

    // 计算测试结果
    function computeResult() {
      const rawScores = {};
      const levels = {};
      const dimQuestionCount = {};
      // 初始化每个维度的分数和问题数为0
      Object.keys(dimensionMeta).forEach(dim => { 
        rawScores[dim] = 0;
        dimQuestionCount[dim] = 0;
      });

      // 计算每个维度的总分和问题数
      questions.forEach(q => {
        rawScores[q.dim] += Number(app.answers[q.id] || 0);
        dimQuestionCount[q.dim]++;
      });

      // 将每个维度的分数转换为等级
      Object.entries(rawScores).forEach(([dim, score]) => {
        const maxScore = dimQuestionCount[dim] * 4; // 每个问题满分4分
        levels[dim] = sumToLevel(score, maxScore);
      });

      // 计算用户向量和每个角色的相似度（使用原始分数）
      const userVector = dimensionOrder.map(dim => rawScores[dim]);
      const ranked = NORMAL_TYPES.map(type => {
        const vector = type.vector;
        
        let distance = 0;
        let totalPossibleDistance = 0;
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          totalPossibleDistance += 12; // 每个维度最大可能差异为12
        }
        const similarity = Math.max(0, Math.round((1 - distance / totalPossibleDistance) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, similarity };
      }).sort((a, b) => {
        if (a.similarity !== b.similarity) return b.similarity - a.similarity;
        return a.distance - b.distance;
      });

      const bestNormal = ranked[0];
      const drunkTriggered = getDrunkTriggered();

      let finalType;
      let modeKicker = '你的排球少年人格';
      let badge = `匹配度 ${bestNormal.similarity}%`;
      let sub = '维度命中度较高，你非常像这位角色！';
      let special = false;
      let secondaryType = null;

      finalType = bestNormal;

      return {
        rawScores,
        levels,
        ranked,
        bestNormal,
        finalType,
        modeKicker,
        badge,
        sub,
        special,
        secondaryType
      };
    }

    // 渲染维度列表
    function renderDimList(result) {
      const dimList = document.getElementById('dimList');
      // 定义每个维度的满分
      const maxScores = {
        'OFF': 12, // 3个问题，每个问题4分
        'LDR': 12, // 3个问题，每个问题4分
        'RAT': 12, // 3个问题，每个问题4分
        'POS': 12, // 3个问题，每个问题4分
        'TAL': 12, // 3个问题，每个问题4分
        'WLD': 12, // 3个问题，每个问题4分
        'CON': 12, // 3个问题，每个问题4分
        'SRV': 12, // 3个问题，每个问题4分
        'RC': 12,  // 3个问题，每个问题4分
        'PAS': 12  // 3个问题，每个问题4分
      };
      dimList.innerHTML = dimensionOrder.map(dim => {
        const level = result.levels[dim];
        const score = result.rawScores[dim];
        const maxScore = maxScores[dim];
        const dimName = dimensionMeta[dim].name;
        const explanation = DIM_EXPLANATIONS[dim][level];
        
        return `
          <div class="dim-item">
            <div class="dim-item-top">
              <div class="dim-item-name">${dimName}</div>
              <div class="dim-item-score">${level} / ${score}分</div>
            </div>
            <p>${explanation}</p>
          </div>
        `;
      }).join('');
    }

    // 渲染结果页面
    function renderResult() {
      const result = computeResult();
      const type = result.finalType;

      // 更新结果页面的内容
      document.getElementById('resultModeKicker').textContent = result.modeKicker;
      document.getElementById('resultTypeName').textContent = `${type.code}（${type.cn}）`;
      document.getElementById('matchBadge').textContent = result.badge;
      document.getElementById('resultTypeSub').textContent = result.sub;
      document.getElementById('resultDesc').textContent = type.desc;
      document.getElementById('posterCaption').textContent = type.intro;
      document.getElementById('funNote').textContent = '本测试仅供娱乐，角色定义并不全面，请勿过度较真。';

      // 处理角色图片
      const posterBox = document.getElementById('posterBox');
      const posterImage = document.getElementById('posterImage');
      const imageSrc = TYPE_IMAGES[type.code];
      if (imageSrc) {
        posterImage.src = imageSrc;
        posterImage.alt = `${type.code}（${type.cn}）`;
        posterBox.classList.remove('no-image');
      } else {
        posterImage.removeAttribute('src');
        posterImage.alt = '';
        posterBox.classList.add('no-image');
      }

      // 渲染维度列表并显示结果屏幕
      renderDimList(result);
      showScreen('result');
    }

    // 开始测试
    function startTest(preview = false) {
      app.previewMode = preview;
      app.answers = {};
      app.currentQuestionIndex = 0; // 重置当前问题索引
      const shuffledRegular = shuffle(questions);
      const insertIndex = Math.floor(Math.random() * shuffledRegular.length) + 1;
      app.shuffledQuestions = [
        ...shuffledRegular.slice(0, insertIndex),
        specialQuestions[0],
        ...shuffledRegular.slice(insertIndex)
      ];
      renderQuestions();
      showScreen('test');
    }

    // 事件监听器：绑定按钮点击事件
    document.getElementById('startBtn').addEventListener('click', () => startTest(false));
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (app.currentQuestionIndex > 0) {
        app.currentQuestionIndex--;
        renderQuestions();
      }
    });
    document.getElementById('submitBtn').addEventListener('click', () => {
      const totalQuestions = app.shuffledQuestions.length;
      if (app.currentQuestionIndex < totalQuestions - 1) {
        // 不是最后一题，跳转到下一题
        app.currentQuestionIndex++;
        renderQuestions();
      } else {
        // 最后一题，提交结果
        renderResult();
      }
    });
    document.getElementById('restartBtn').addEventListener('click', () => startTest(false));
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>

</body>
